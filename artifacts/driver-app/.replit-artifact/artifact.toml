kind = "mobile"
previewPath = "/"
title = "Driver App"
version = "1.0.0"
id = "artifacts/driver-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18809

[services.development]
run = "pnpm --filter @workspace/driver-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/driver-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/driver-app", "run", "serve" ]

[services.env]
PORT = "18809"
BASE_PATH = "/"
